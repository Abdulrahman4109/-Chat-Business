services:
  - type: web
    name: chatbusiness-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: cors_origins
        fromService:
          name: chatbusiness-frontend
          type: static
          property: url

  - type: static
    name: chatbusiness-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: chatbusiness-api
          type: web
          property: url
